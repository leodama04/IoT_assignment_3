<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebSocket Control Panel</title>
    <link href="/static/css/style.css" rel="stylesheet" type="text/css">
</head>
<body>

    <h2>Controllo Modalità</h2>
    
    <div id="status">Stato: <span style="color: gray;">In connessione...</span></div>
    <div class="current-mode">Modalità attiva: <span id="mode-text">Sconosciuta</span></div>

    <div class="controls">
        <button class="btn-auto" onclick="sendMode('AUTOMATIC')" id="btn-auto">MODALITÀ AUTOMATICA</button>
        <button class="btn-manual" onclick="sendMode('REMOTE_MANUAL')" id="btn-manual">REMOTE MANUAL</button>
    </div>

    <div id="log"></div>

    <script>
        const socketURL = "ws://localhost:8000/ws"; 
        let socket;
        
        const logElement = document.getElementById('log');
        const statusElement = document.getElementById('status');
        const modeText = document.getElementById('mode-text');
        const btnAuto = document.getElementById('btn-auto');
        const btnManual = document.getElementById('btn-manual');

        function addLog(msg) {
            const time = new Date().toLocaleTimeString();
            logElement.innerHTML += `<div>[${time}] ${msg}</div>`;
            logElement.scrollTop = logElement.scrollHeight;
        }

        // Funzione per gestire lo stato dei bottoni
        function updateUI(currentMode) {
            modeText.innerText = currentMode;
            
            if (currentMode === 'AUTOMATIC') {
                btnAuto.disabled = true;
                btnManual.disabled = false;
            } else if (currentMode === 'REMOTE_MANUAL') {
                btnAuto.disabled = false;
                btnManual.disabled = true;
            }
        }

        function connect() {
            socket = new WebSocket(socketURL);

            socket.onopen = () => {
                statusElement.innerHTML = 'Stato: <span style="color: green;">Connesso</span>';
                addLog("Connessione stabilita.");
            };

            socket.onmessage = (event) => {
                const receivedData = event.data;
                addLog(`Server Broadcast: ${receivedData}`);
                
                // Aggiorna l'interfaccia basandosi sul messaggio ricevuto
                updateUI(receivedData);
            };

            socket.onclose = () => {
                statusElement.innerHTML = 'Stato: <span style="color: red;">Disconnesso</span>';
                btnAuto.disabled = true;
                btnManual.disabled = true;
                addLog("Connessione persa. Riconnessione...");
                setTimeout(connect, 3000);
            };

            socket.onerror = (error) => {
                addLog("Errore WebSocket.");
            };
        }

        function sendMode(mode) {
            if (socket && socket.readyState === WebSocket.OPEN) {
                socket.send(mode);
                addLog(`Richiesta inviata: ${mode}`);
            }
        }

        connect();
    </script>
</body>
</html>
